name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v0.2.4"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    env:
      CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - name: Create release if missing
        run: |
          NOTES_FILE="scripts/version/${RELEASE_TAG#v}.md"
          TITLE="NomadTerm ${RELEASE_TAG}"

          if [[ -f "${NOTES_FILE}" ]]; then
            if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
              gh release edit "${RELEASE_TAG}" \
                --title "${TITLE}" \
                --notes-file "${NOTES_FILE}"
            else
              gh release create "${RELEASE_TAG}" \
                --title "${TITLE}" \
                --notes-file "${NOTES_FILE}" \
                --verify-tag
            fi

            exit 0
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists and no notes file was found"
            exit 0
          fi

          gh release create "${RELEASE_TAG}" \
            --title "${TITLE}" \
            --generate-notes \
            --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}

  build-daemon:
    name: Daemon - ${{ matrix.name }}
    needs: [create-release]
    runs-on: ${{ matrix.os }}
    env:
      CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
            deb_arch: amd64
            features: --features gui
            gui_deps: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: linux-arm64
            deb_arch: arm64
            linker: gcc-aarch64-linux-gnu
            # GUI omitted: cross-compiling wayland/x11 for ARM64 is unsupported here.
          - os: macos-latest
            target: aarch64-apple-darwin
            name: darwin-arm64
            features: --features gui
          - os: macos-15-intel
            target: x86_64-apple-darwin
            name: darwin-x86_64
            features: --features gui
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
            ext: .exe
            features: --features gui

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux GUI dependencies
        if: matrix.gui_deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libx11-dev \
            libgl1-mesa-dev \
            libfontconfig-dev \
            pkg-config \
            imagemagick

      - name: Install cross-linker (ARM Linux)
        if: matrix.linker != ''
        run: sudo apt-get install -y ${{ matrix.linker }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Upload binary to release
        shell: bash
        run: |
          EXT="${{ matrix.ext }}"
          cp target/${{ matrix.target }}/release/nomadterm${EXT} \
             nomadterm-${{ matrix.name }}${EXT}
          gh release upload "${RELEASE_TAG}" \
            nomadterm-${{ matrix.name }}${EXT} --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Linux server bundle
        if: startsWith(matrix.name, 'linux-')
        shell: bash
        run: |
          BUNDLE="nomadterm-server-${{ matrix.name }}"
          mkdir -p "${BUNDLE}"
          cp target/${{ matrix.target }}/release/nomadterm "${BUNDLE}/"
          sed "s|__REPO__|${{ github.repository }}|g" \
            scripts/install.sh > "${BUNDLE}/install.sh"
          chmod +x "${BUNDLE}/install.sh"
          cp contrib/nomadterm.service "${BUNDLE}/"
          printf '%s\n' \
            'NomadTerm Linux Quick Start' \
            '===========================' \
            '1. Manual run:' \
            '     ./nomadterm --ws --bind-tailscale --port 7681' \
            '' \
            '   If you are not using Tailscale, omit --bind-tailscale.' \
            '' \
            '2. First-time systemd install:' \
            '     sudo bash install.sh init' \
            '' \
            '3. Update later:' \
            '     sudo bash install.sh update' \
            > "${BUNDLE}/README.txt"
          tar czf "${BUNDLE}.tar.gz" "${BUNDLE}"

      - name: Upload Linux bundle to release
        if: startsWith(matrix.name, 'linux-')
        shell: bash
        run: |
          gh release upload "${RELEASE_TAG}" \
            nomadterm-server-${{ matrix.name }}.tar.gz --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build .deb package
        if: startsWith(matrix.name, 'linux-')
        shell: bash
        env:
          FEATURES: ${{ matrix.features }}
          DEB_ARCH: ${{ matrix.deb_arch }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          PKG="nomadterm_${VERSION}_${DEB_ARCH}"

          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/usr/bin"
          mkdir -p "${PKG}/lib/systemd/system"
          cp "target/${{ matrix.target }}/release/nomadterm" "${PKG}/usr/bin/nomadterm"
          cp contrib/nomadterm.service "${PKG}/lib/systemd/system/"

          if [[ "${FEATURES}" == *gui* ]]; then
            for SIZE in 48 128 256; do
              mkdir -p "${PKG}/usr/share/icons/hicolor/${SIZE}x${SIZE}/apps"
              convert -resize "${SIZE}x${SIZE}" \
                contrib/logo.png \
                "${PKG}/usr/share/icons/hicolor/${SIZE}x${SIZE}/apps/nomadterm.png"
            done
            mkdir -p "${PKG}/usr/share/applications"
            cp contrib/nomadterm.desktop "${PKG}/usr/share/applications/"
          fi

          INSTALLED_SIZE=$(du -sk "${PKG}" | cut -f1)
          printf 'Package: nomadterm\nVersion: %s\nArchitecture: %s\nMaintainer: NomadTerm <noreply@nomadterm.dev>\nInstalled-Size: %s\nSection: utils\nPriority: optional\nDescription: NomadTerm -- Secure Remote PTY Daemon for Multi-AI CLI\n PTY daemon for Claude Code, Codex, Copilot and Gemini CLI\n with Flutter mobile client integration.\n' \
            "${VERSION}" "${DEB_ARCH}" "${INSTALLED_SIZE}" \
            > "${PKG}/DEBIAN/control"

          cp contrib/debian/postinst "${PKG}/DEBIAN/postinst"
          cp contrib/debian/prerm    "${PKG}/DEBIAN/prerm"
          chmod 755 "${PKG}/DEBIAN/postinst" "${PKG}/DEBIAN/prerm"

          dpkg-deb --build --root-owner-group "${PKG}"
          echo "DEB_FILE=${PKG}.deb" >> "$GITHUB_ENV"

      - name: Upload .deb to release
        if: startsWith(matrix.name, 'linux-')
        shell: bash
        run: |
          gh release upload "${RELEASE_TAG}" "$DEB_FILE" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          DEB_FILE: ${{ env.DEB_FILE }}

      - name: Create macOS server bundle
        if: startsWith(matrix.name, 'darwin-')
        shell: bash
        run: |
          BUNDLE="nomadterm-server-${{ matrix.name }}"
          mkdir -p "${BUNDLE}"
          cp target/${{ matrix.target }}/release/nomadterm "${BUNDLE}/"
          cp contrib/com.nomadterm.daemon.plist "${BUNDLE}/"
          printf '%s\n' \
            'NomadTerm macOS Quick Start' \
            '===========================' \
            '1. Manual run:' \
            '     ./nomadterm --ws --bind-tailscale --port 7681' \
            '' \
            '   If you are not using Tailscale, omit --bind-tailscale.' \
            '' \
            '2. Install the binary:' \
            '     sudo cp nomadterm /usr/local/bin/nomadterm' \
            '' \
            '3. Load the launchd service as your current user:' \
            '     cp com.nomadterm.daemon.plist ~/Library/LaunchAgents/' \
            '     launchctl load ~/Library/LaunchAgents/com.nomadterm.daemon.plist' \
            '' \
            'Service management:' \
            '     launchctl start  com.nomadterm.daemon' \
            '     launchctl stop   com.nomadterm.daemon' \
            '     launchctl unload ~/Library/LaunchAgents/com.nomadterm.daemon.plist' \
            > "${BUNDLE}/README.txt"
          tar czf "${BUNDLE}.tar.gz" "${BUNDLE}"

      - name: Upload macOS bundle to release
        if: startsWith(matrix.name, 'darwin-')
        shell: bash
        run: |
          gh release upload "${RELEASE_TAG}" \
            nomadterm-server-${{ matrix.name }}.tar.gz --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Windows server bundle
        if: startsWith(matrix.name, 'windows-')
        shell: pwsh
        run: |
          $bundle = "nomadterm-server-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path $bundle | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/nomadterm.exe" "$bundle/nomadterm.exe"
          Copy-Item "contrib/windows-service.md" "$bundle/windows-service.md"
          @(
            'NomadTerm Windows Quick Start'
            '============================='
            '1. Manual run:'
            '     .\nomadterm.exe --ws --bind-tailscale --port 7681'
            ''
            '   If you are not using Tailscale, omit --bind-tailscale.'
            ''
            '2. To run as a service, follow windows-service.md.'
            '3. Keep Tailscale running so --bind-tailscale can bind to the Tailscale IP.'
          ) | Set-Content -Path "$bundle/README.txt"
          Compress-Archive -Path $bundle -DestinationPath "$bundle.zip" -Force

      - name: Upload Windows bundle to release
        if: startsWith(matrix.name, 'windows-')
        shell: pwsh
        run: |
          gh release upload "${env:RELEASE_TAG}" `
            "nomadterm-server-${{ matrix.name }}.zip" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  publish-support-files:
    name: Publish Support Files
    needs: [create-release]
    runs-on: ubuntu-latest
    env:
      CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Prepare Linux install script
        run: |
          sed "s|__REPO__|${{ github.repository }}|g" \
            scripts/install.sh > install.sh
          chmod +x install.sh

      - name: Upload support files
        run: |
          gh release upload "${RELEASE_TAG}" \
            install.sh \
            contrib/nomadterm.service \
            contrib/com.nomadterm.daemon.plist \
            contrib/windows-service.md \
            contrib/nomadterm.desktop \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}
